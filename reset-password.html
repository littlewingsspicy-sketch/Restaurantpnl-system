<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — NRK ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,'Noto Sans Thai',sans-serif;background:#f6f1ea;color:#222}
.card{width:min(420px,92vw);background:#fff;border:1px solid #e6d8c8;border-radius:22px;padding:26px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{margin:0 0 8px;color:#111}p{opacity:.72;line-height:1.45}label{display:block;margin-top:14px;font-weight:800}
input{width:100%;border:1px solid #d8c9b8;border-radius:14px;padding:12px;margin-top:6px;font-size:16px}
button{width:100%;border:0;border-radius:14px;padding:12px;margin-top:18px;background:#d9c400;font-weight:900;font-size:16px;cursor:pointer}
button:disabled{opacity:.55;cursor:not-allowed}.status{margin-top:14px;font-size:14px;color:#555;line-height:1.45}.err{color:#b91c1c;font-weight:800}.ok{color:#166534;font-weight:800}
a{color:#7a5d00;font-weight:800}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 ตั้งรหัสผ่านใหม่</h1>
  <p>กรอกรหัสผ่านใหม่สำหรับ NRK ERP</p>
  <label>Password ใหม่</label>
  <input id="password" type="password" placeholder="รหัสผ่านใหม่" autocomplete="new-password">
  <label>Confirm Password</label>
  <input id="confirm" type="password" placeholder="ยืนยันรหัสผ่านใหม่" autocomplete="new-password">
  <button id="saveBtn" onclick="updatePassword()">บันทึกรหัสผ่านใหม่</button>
  <div id="status" class="status">เปิดหน้านี้จากลิงก์ Reset Password ในอีเมล</div>
</div>
<script>
const SUPABASE_URL = "https://mjbxskhfvaxxcopzesic.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qYnhza2hmdmF4eGNvcHplc2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjg4NTIsImV4cCI6MjA5MDk0NDg1Mn0.G2W728EIN6qfALpW06YCdSkVKKnAO1bULMGIlei-Z2U";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function setStatus(message, type=""){
  const status = document.getElementById("status");
  status.innerHTML = message;
  status.className = "status" + (type ? " " + type : "");
}

async function ensureRecoverySession(){
  const result = await db.auth.getSession();
  if(result.data.session){
    setStatus("พร้อมตั้งรหัสผ่านใหม่แล้ว");
    return;
  }
  setStatus("ถ้าหน้านี้ไม่ได้เปิดจากลิงก์ในอีเมล กรุณากดลืมรหัสผ่านใหม่จากหน้า Login", "err");
}

async function updatePassword(){
  const btn = document.getElementById("saveBtn");
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  if(!password || password.length < 6){
    setStatus("รหัสผ่านควรมีอย่างน้อย 6 ตัวอักษร", "err");
    return;
  }
  if(password !== confirm){
    setStatus("Password และ Confirm Password ไม่ตรงกัน", "err");
    return;
  }
  btn.disabled = true;
  btn.textContent = "กำลังบันทึก...";
  const result = await db.auth.updateUser({ password });
  btn.disabled = false;
  btn.textContent = "บันทึกรหัสผ่านใหม่";
  if(result.error){
    setStatus(result.error.message, "err");
    return;
  }
  setStatus("✅ เปลี่ยนรหัสผ่านเรียบร้อยแล้ว <br><br><a href='login.html'>กลับไปหน้า Login</a>", "ok");
}

document.addEventListener("keydown", e=>{
  if(e.key === "Enter") updatePassword();
});

ensureRecoverySession();
</script>
</body>
</html>

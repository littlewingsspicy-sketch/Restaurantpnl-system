<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NRK Food Cost Engine v4</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family: Arial, "Noto Sans Thai", sans-serif;
  background: #f6f1ea;
  color: #222;
}
.wrap {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}
.side {
  background: #111;
  color: #fff;
  padding: 24px;
  position: sticky;
  top: 0;
  height: 100vh;
}
.side h1 {
  color: #ffd21a;
  font-size: 22px;
  margin: 0 0 20px;
}
.side a {
  display: block;
  color: #fff;
  text-decoration: none;
  padding: 12px;
  border-radius: 12px;
  margin-top: 8px;
}
.side a.active {
  background: #4a4109;
}
.main {
  padding: 24px;
  overflow-x: hidden;
}
.card {
  background: #fff;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 18px;
  border: 1px solid #e5d7c7;
  box-shadow: 0 2px 10px rgba(0,0,0,.03);
  overflow-x: auto;
}
h2, h3 {
  margin-top: 0;
}
.topbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
input, select, button {
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  min-width: 0;
  max-width: 100%;
}
input, select {
  width: 100%;
}
button {
  cursor: pointer;
  font-weight: 700;
  white-space: nowrap;
}
button.primary {
  background: #d9c400;
  border: 0;
}
button.danger {
  background: #fee2e2;
  color: #991b1b;
}
button.secondary {
  background: #eee;
}
.grid2 {
  display: grid;
  grid-template-columns: minmax(650px, 1.1fr) minmax(440px, .9fr);
  gap: 18px;
  align-items: start;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1080px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  white-space: nowrap;
  text-align: left;
  vertical-align: top;
}
th:nth-child(n+3), td:nth-child(n+3) {
  text-align: right;
}
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
  gap: 10px;
  margin: 12px 0;
}
.kpi {
  background: #fff8df;
  border: 1px solid #e6d8c8;
  border-radius: 14px;
  padding: 12px;
}
.kpi small {
  display: block;
  opacity: .72;
  font-weight: 800;
  margin-bottom: 6px;
}
.kpi b {
  font-size: clamp(18px, 2.2vw, 24px);
  display: block;
  overflow-wrap: anywhere;
}
.line-form {
  display: grid;
  grid-template-columns: 1.5fr .55fr .55fr auto;
  gap: 8px;
  align-items: end;
  margin: 12px 0;
}
.line {
  display: grid;
  grid-template-columns: 1.4fr .5fr .5fr .7fr .7fr auto;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding: 8px 0;
}
.line.head {
  font-weight: 900;
  opacity: .8;
}
.help {
  font-size: 13px;
  opacity: .72;
  line-height: 1.45;
}
.status {
  position: fixed;
  right: 18px;
  bottom: 18px;
  background: #111;
  color: #fff;
  padding: 10px 14px;
  border-radius: 14px;
  z-index: 50;
}
.good {
  color: #168a42;
  font-weight: 900;
}
.mid {
  color: #c47f00;
  font-weight: 900;
}
.bad {
  color: #b91c1c;
  font-weight: 900;
}
label {
  display: block;
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 4px;
}
.badge {
  display: inline-block;
  padding: 5px 8px;
  border-radius: 999px;
  background: #fff8df;
  border: 1px solid #e6d8c8;
  margin: 3px;
  font-size: 12px;
}
@media(max-width:1000px) {
  .wrap {
    grid-template-columns: 1fr;
  }
  .side {
    position: relative;
    height: auto;
  }
  .grid2, .line-form {
    grid-template-columns: 1fr;
  }
  .main {
    padding: 14px;
  }
  .topbar {
    flex-direction: column;
    align-items: stretch;
  }
  .card {
    overflow-x: auto;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <h1>🐥 NRK Food Cost</h1>
    <a href="index.html">Workspace</a>
    <a href="foodcost.html" class="active">Food Cost</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="main">
    <div class="card">
      <h2>Food Cost Engine v4</h2>
      <div class="topbar">
        <input id="searchBox" placeholder="ค้นหาเมนู / semi / brand" oninput="renderRecipes()">
        <select id="typeFilter" onchange="renderRecipes()">
          <option value="all">ทั้งหมด</option>
          <option value="menu">Menu</option>
          <option value="semi">Semi</option>
        </select>
        <button class="primary" onclick="loadAll()">Refresh</button>
      </div>
      <p class="help">สูตร Delivery รวม VAT on GP แล้ว: Delivery รวม VAT = ราคาหน้าร้านรวม VAT ÷ (1 - GP% × 1.07)</p>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>Recipes / Semi</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Cost</th>
              <th>Store Price</th>
              <th>Profit</th>
              <th>FC%</th>
              <th>GP%</th>
              <th>Delivery Price</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recipeTable"></tbody>
        </table>
      </div>

      <div class="card">
        <div id="recipeDetail">เลือกเมนูเพื่อดูรายละเอียด</div>
      </div>
    </div>
  </main>
</div>

<div class="status" id="status">Ready</div>

<script>
const SUPABASE_URL = 'https://mjbxskhfvaxxcopzesic.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const OWNER_EMAILS = ["littlewingsspicy@gmail.com"];

let recipes = [];
let recipeLines = [];
let ingredients = [];
let selectedRecipeId = null;

function setStatus(text) {
  document.getElementById("status").textContent = text;
}

function money(n) {
  return "฿" + Number(n || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function typeOf(r) {
  return String(r.type || "").toLowerCase().trim();
}

function isSemi(r) {
  return typeOf(r) === "semi";
}

async function checkLogin() {
  const result = await db.auth.getSession();
  const user = result.data && result.data.session && result.data.session.user;

  if (!user) {
    location.href = "login.html?next=foodcost.html";
    return false;
  }

  if (!OWNER_EMAILS.includes(String(user.email || "").toLowerCase())) {
    alert("Owner only");
    location.href = "index.html";
    return false;
  }

  return true;
}

async function logout() {
  await db.auth.signOut();
  location.href = "login.html";
}

function calcDeliveryPrice(storePriceVat, gpPercent) {
  const effectiveGp = (Number(gpPercent || 0) / 100) * 1.07;
  if (effectiveGp >= 1) return 0;
  return Number(storePriceVat || 0) / (1 - effectiveGp);
}

function fcClass(fc) {
  if (fc > 50) return "bad";
  if (fc > 35) return "mid";
  return "good";
}

function profitClass(p) {
  if (p < 25) return "bad";
  if (p < 40) return "mid";
  return "good";
}

async function loadAll() {
  if (!(await checkLogin())) return;

  setStatus("Loading...");

  const recipeResult = await db.from("recipes").select("*").limit(10000);
  const lineResult = await db.from("recipe_lines").select("*").limit(20000);
  const ingredientResult = await db.from("ingredients").select("*").limit(10000);

  if (recipeResult.error || lineResult.error || ingredientResult.error) {
    console.error(recipeResult.error || lineResult.error || ingredientResult.error);
    alert((recipeResult.error || lineResult.error || ingredientResult.error).message);
    setStatus("Load error");
    return;
  }

  recipes = recipeResult.data || [];
  recipeLines = lineResult.data || [];
  ingredients = ingredientResult.data || [];

  renderRecipes();
  if (selectedRecipeId) showRecipe(selectedRecipeId);

  setStatus("Loaded ✓");
}

function getIngredientUnitCost(ing) {
  return Number(
    ing.cost_per_use ||
    ing.unit_use_cost ||
    ing.price_per_use ||
    ing.last_cost ||
    ing.cost ||
    0
  );
}

function recipeCost(recipeId, visited) {
  visited = visited || new Set();

  if (visited.has(String(recipeId))) return 0;
  visited.add(String(recipeId));

  const lines = recipeLines.filter(x => String(x.recipe_id) === String(recipeId));

  if (!lines.length) {
    const r = recipes.find(x => String(x.id) === String(recipeId));
    return Number((r && r.cost_per_output) || 0);
  }

  return lines.reduce((sum, line) => {
    const sourceType = String(line.source_type || "").toLowerCase();

    if (sourceType === "recipe" || sourceType === "semi" || sourceType === "menu") {
      return sum + recipeCost(line.source_id, new Set(visited)) * Number(line.quantity || 1);
    }

    return sum + Number(line.line_cost || 0);
  }, 0);
}

function sourceCalc(sourceType, sourceId, qty) {
  qty = Number(qty || 0);

  if (sourceType === "ingredient") {
    const ing = ingredients.find(x => String(x.id) === String(sourceId));
    const unitCost = ing ? getIngredientUnitCost(ing) : 0;
    return {
      name: ing ? ing.name : "",
      unit: ing ? (ing.usage_unit || ing.unit_use || ing.unit || "") : "",
      unitCost,
      lineCost: unitCost * qty
    };
  }

  const r = recipes.find(x => String(x.id) === String(sourceId));
  const unitCost = r ? recipeCost(r.id) : 0;

  return {
    name: r ? r.name : "",
    unit: r ? (r.output_unit || "portion") : "portion",
    unitCost,
    lineCost: unitCost * qty
  };
}

function renderRecipes() {
  const q = String(document.getElementById("searchBox").value || "").toLowerCase();
  const typeFilter = document.getElementById("typeFilter").value;
  const tbody = document.getElementById("recipeTable");

  const filtered = recipes.filter(r => {
    const text = [r.name, r.type, r.brand_id].join(" ").toLowerCase();
    const typeOk = typeFilter === "all" || typeOf(r) === typeFilter;
    return text.includes(q) && typeOk;
  });

  tbody.innerHTML = filtered.map(r => {
    const cost = recipeCost(r.id);
    const price = Number(r.base_price || 0);
    const profit = price - cost;
    const fc = price ? cost / price * 100 : 0;
    const gp = Number(r.delivery_gp_percent || 0);
    const delivery = calcDeliveryPrice(price, gp);
    const semi = isSemi(r);

    return `
      <tr>
        <td>${r.name || ""}</td>
        <td>${r.type || ""}</td>
        <td>${money(cost)}</td>
        <td>${semi ? "—" : money(price)}</td>
        <td>${semi ? "—" : `<span class="${profitClass(profit)}">${money(profit)}</span>`}</td>
        <td>${semi ? "—" : `<span class="${fcClass(fc)}">${fc.toFixed(1)}%</span>`}</td>
        <td>${semi ? "—" : gp.toFixed(1) + "%"}</td>
        <td>${semi ? "—" : money(delivery)}</td>
        <td style="text-align:left">
          <button onclick="showRecipe('${r.id}')">ดู</button>
          ${semi ? "" : `<button class="secondary" onclick="editPrice('${r.id}')">แก้ราคา</button>`}
        </td>
      </tr>
    `;
  }).join("");
}

function sourceOptions(currentRecipeId) {
  let html = "";

  html += `<optgroup label="Ingredients">`;
  ingredients.slice().sort((a,b)=>String(a.name||"").localeCompare(String(b.name||""),"th")).forEach(i => {
    html += `<option value="ingredient|${i.id}">${i.name || ""}</option>`;
  });
  html += `</optgroup>`;

  html += `<optgroup label="Semi">`;
  recipes.filter(r => typeOf(r) === "semi" && String(r.id) !== String(currentRecipeId)).forEach(r => {
    html += `<option value="recipe|${r.id}">${r.name || ""}</option>`;
  });
  html += `</optgroup>`;

  html += `<optgroup label="Menu">`;
  recipes.filter(r => typeOf(r) !== "semi" && String(r.id) !== String(currentRecipeId)).forEach(r => {
    html += `<option value="recipe|${r.id}">${r.name || ""}</option>`;
  });
  html += `</optgroup>`;

  return html;
}

function showRecipe(recipeId) {
  selectedRecipeId = recipeId;

  const recipe = recipes.find(x => String(x.id) === String(recipeId));
  if (!recipe) return;

  const lines = recipeLines.filter(x => String(x.recipe_id) === String(recipeId));
  const cost = recipeCost(recipeId);
  const price = Number(recipe.base_price || 0);
  const gp = Number(recipe.delivery_gp_percent || 0);
  const profit = price - cost;
  const delivery = calcDeliveryPrice(price, gp);

  let html = `
    <h2>${recipe.name || ""}</h2>

    <div class="kpi-grid">
      <div class="kpi"><small>Cost</small><b>${money(cost)}</b></div>
      <div class="kpi"><small>Store Price</small><b>${isSemi(recipe) ? "—" : money(price)}</b></div>
      <div class="kpi"><small>Profit</small><b>${isSemi(recipe) ? "—" : money(profit)}</b></div>
      <div class="kpi"><small>Delivery Recommended</small><b>${isSemi(recipe) ? "—" : money(delivery)}</b><div class="help">รวม VAT on GP</div></div>
    </div>

    <p class="help">
      <span class="badge">GP: ${gp.toFixed(1)}%</span>
      <span class="badge">Effective GP รวม VAT: ${(gp * 1.07).toFixed(2)}%</span>
    </p>

    <hr>

    <h3>เพิ่มส่วนผสม</h3>

    <div class="line-form">
      <div>
        <label>เลือกจาก Ingredient / Semi / Menu</label>
        <select id="newSource">${sourceOptions(recipeId)}</select>
      </div>

      <div>
        <label>Qty</label>
        <input id="newQty" type="number" step="0.001" value="1">
      </div>

      <div>
        <label>Unit</label>
        <input id="newUnit" placeholder="unit">
      </div>

      <button class="primary" onclick="addLine('${recipeId}')">เพิ่ม</button>
    </div>

    <hr>

    <div class="line head">
      <div>รายการ</div>
      <div>Qty</div>
      <div>Unit</div>
      <div>Cost/U</div>
      <div>Total</div>
      <div></div>
    </div>
  `;

  html += lines.map(line => `
    <div class="line">
      <div><b>${line.source_type || "ingredient"}</b><br>${line.source_name || ""}</div>
      <div>${Number(line.quantity || 0).toLocaleString()}</div>
      <div>${line.usage_unit || ""}</div>
      <div>${money(line.unit_cost)}</div>
      <div>${money(line.line_cost)}</div>
      <div>
        <button onclick="editLine('${line.id}')">แก้</button>
        <button class="danger" onclick="deleteLine('${line.id}')">ลบ</button>
      </div>
    </div>
  `).join("");

  if (!lines.length) {
    html += `<p class="help">ยังไม่มีส่วนผสม</p>`;
  }

  document.getElementById("recipeDetail").innerHTML = html;
}

async function addLine(recipeId) {
  const raw = document.getElementById("newSource").value;
  const qty = Number(document.getElementById("newQty").value || 0);
  const unitTyped = document.getElementById("newUnit").value.trim();

  const parts = raw.split("|");
  const sourceType = parts[0];
  const sourceId = parts[1];

  if (!sourceType || !sourceId || qty <= 0) {
    alert("กรุณาเลือกส่วนผสมและใส่จำนวน");
    return;
  }

  if (String(sourceId) === String(recipeId)) {
    alert("ห้ามใช้เมนูตัวเองเป็นส่วนผสม");
    return;
  }

  const calc = sourceCalc(sourceType, sourceId, qty);

  const row = {
    recipe_id: recipeId,
    source_type: sourceType,
    source_id: sourceId,
    source_name: calc.name,
    quantity: qty,
    usage_unit: unitTyped || calc.unit,
    unit_cost: calc.unitCost,
    line_cost: calc.lineCost
  };

  const result = await db.from("recipe_lines").insert(row);

  if (result.error) {
    alert(result.error.message);
    return;
  }

  await recalcRecipe(recipeId);
  await loadAll();
  showRecipe(recipeId);
}

async function editLine(id) {
  const line = recipeLines.find(x => String(x.id) === String(id));
  if (!line) return;

  const qtyText = prompt("Quantity", line.quantity);
  if (qtyText === null) return;

  const unitText = prompt("Unit", line.usage_unit || "");
  if (unitText === null) return;

  const qty = Number(qtyText || 0);
  let unitCost = Number(line.unit_cost || 0);

  if (line.source_type && line.source_id) {
    const calc = sourceCalc(line.source_type, line.source_id, qty);
    unitCost = calc.unitCost;
  }

  const result = await db.from("recipe_lines")
    .update({
      quantity: qty,
      usage_unit: unitText,
      unit_cost: unitCost,
      line_cost: unitCost * qty
    })
    .eq("id", id);

  if (result.error) {
    alert(result.error.message);
    return;
  }

  await recalcRecipe(selectedRecipeId);
  await loadAll();
  showRecipe(selectedRecipeId);
}

async function deleteLine(id) {
  if (!confirm("ลบส่วนผสมนี้?")) return;

  const result = await db.from("recipe_lines").delete().eq("id", id);

  if (result.error) {
    alert(result.error.message);
    return;
  }

  await recalcRecipe(selectedRecipeId);
  await loadAll();
  showRecipe(selectedRecipeId);
}

async function recalcRecipe(recipeId) {
  const cost = recipeCost(recipeId);

  const result = await db.from("recipes")
    .update({ cost_per_output: cost })
    .eq("id", recipeId);

  if (result.error) {
    console.warn(result.error.message);
  }
}

async function editPrice(recipeId) {
  const recipe = recipes.find(x => String(x.id) === String(recipeId));
  if (!recipe) return;

  const priceText = prompt("Store price รวม VAT", Number(recipe.base_price || 0));
  if (priceText === null) return;

  const gpText = prompt("GP Delivery %", Number(recipe.delivery_gp_percent || 0));
  if (gpText === null) return;

  const price = Number(priceText || 0);
  const gp = Number(gpText || 0);
  const delivery = calcDeliveryPrice(price, gp);

  const result = await db.from("recipes")
    .update({
      base_price: price,
      vat_price: price / 1.07,
      delivery_gp_percent: gp,
      gp_price: delivery,
      final_price: delivery
    })
    .eq("id", recipeId);

  if (result.error) {
    alert(result.error.message);
    return;
  }

  recipe.base_price = price;
  recipe.vat_price = price / 1.07;
  recipe.delivery_gp_percent = gp;
  recipe.gp_price = delivery;
  recipe.final_price = delivery;

  renderRecipes();
  showRecipe(recipeId);
}

loadAll();
</script>
</body>
</html>
